services:

  kafka-searchengine:
    image: bitnamilegacy/kafka:4.0.0-debian-12-r10
    container_name: kafka-searchengine
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka-searchengine:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka-searchengine:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      ALLOW_PLAINTEXT_LISTENER: yes

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  crawler-service:
    build:
      context: .
      dockerfile: crawler-service/Dockerfile
    depends_on:
      - kafka-searchengine

  indexer-service:
    build:
      context: .
      dockerfile: indexer-service/Dockerfile
    depends_on:
      - kafka-searchengine
      - elasticsearch

  query-service:
    build:
      context: .
      dockerfile: query-service/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - elasticsearch

  pagerank-service:
    build:
      context: .
      dockerfile: pagerank-service/Dockerfile
    depends_on:
      - kafka-searchengine

  autocomplete-service:
    build:
      context: .
      dockerfile: autocomplete-service/Dockerfile
    depends_on:
      - kafka-searchengine