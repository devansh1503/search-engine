services:

  kafka-searchengine:
    image: bitnamilegacy/kafka:4.0.0-debian-12-r10
    container_name: kafka-searchengine
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka-searchengine:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka-searchengine:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      ALLOW_PLAINTEXT_LISTENER: yes
    volumes:
      - kafka_data:/bitnami/kafka

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  redis:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  crawler-service:
    build:
      context: .
      dockerfile: crawler-service/Dockerfile
    depends_on:
      - kafka-searchengine

  indexer-service:
    build:
      context: .
      dockerfile: indexer-service/Dockerfile
    depends_on:
      - kafka-searchengine
      - elasticsearch

  query-service:
    build:
      context: .
      dockerfile: query-service/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - elasticsearch
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}

  pagerank-service:
    build:
      context: .
      dockerfile: pagerank-service/Dockerfile
    depends_on:
      - kafka-searchengine

  autocomplete-service:
    build:
      context: .
      dockerfile: autocomplete-service/Dockerfile
    ports:
      - "8084:8084"
    depends_on:
      - kafka-searchengine

  embedding-service:
    image: ollama/ollama
    container_name: embedding-service
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: [ "/bin/sh", "-c" ]
    command: >
      "ollama serve &
       sleep 5 &&
       ollama pull nomic-embed-text &&
       ollama pull llama3 &&
       wait"
    restart: always

  faiss-service:
    build:
      context: ./faiss-service
    ports:
      - "8002:8002"
#  embedding-service:
#    build:
#      context: ./embedding-service
#    ports:
#      - "8001:8000"

volumes:
  kafka_data:
  redis_data:
  es_data:
  ollama_data: